<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>RESULT</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DotGothic16', sans-serif; background: #000; color: #fff; padding: 40px; text-align: center; }
        .result-card { max-width: 450px; margin: auto; border: 4px solid #fff; background: #111; padding: 40px; }
        .score { font-size: 4rem; margin: 20px 0; text-shadow: 0 0 10px #fff; }
        .failed { color: #ef4444; text-shadow: 0 0 10px #ef4444; }
        .success { color: #4ade80; text-shadow: 0 0 10px #4ade80; }
        .btn-home { 
            display: block; margin-top: 30px; padding: 15px; background: transparent; 
            border: 2px solid #fff; color: #fff; text-decoration: none; font-weight: bold;
        }
        .btn-home:hover { background: #fff; color: #000; }
    </style>
</head>
<body>
    <div class="result-card">
        {% if failed %}
            <h2 class="failed">力尽きた...</h2>
            <div class="score failed">{{ score }}</div>
            <p style="color:#94a3b8;">{{ user_stats.form_name }}の限界を超えた</p>
        {% else %}
            <h2 class="success">修行完了！</h2>
            <div class="score success">{{ score }}<small style="font-size:1.5rem;">/{{ total }}</small></div>
            <p>経験値を獲得した</p>
        {% endif %}

        <div style="margin-top:30px; padding:15px; border-top:1px solid #333; font-size:0.9rem;">
            現在の姿: <span style="color:#60a5fa;">{{ user_stats.form_name }}</span><br>
            {% if user_stats.next_evolution > 0 %}
                あと <b style="color:#f59e0b;">{{ user_stats.next_evolution }}</b> 問の新規正解で進化
            {% else %}
                <span style="color:#f59e0b;">極めし者の風格</span>
            {% endif %}
        </div>

        <a href="/" class="btn-home">▶ メニューへもどる</a>
    </div>
</body>
</html>
