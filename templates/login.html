<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOGIN - クイズRPG</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'DotGothic16', sans-serif; background: #000; color: #fff; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;
        }
        .login-card { 
            width: 100%; max-width: 400px; padding: 25px; border: 4px solid #fff; 
            background: #111; text-align: center; box-sizing: border-box;
            outline: 4px solid #333; outline-offset: -8px;
        }
        h1 { font-size: 1.5rem; color: #f59e0b; margin: 0 0 20px 0; text-shadow: 2px 2px #444; }
        
        .notice-box {
            background: #222; border: 2px solid #444; padding: 15px; 
            text-align: left; font-size: 0.8rem; line-height: 1.6; 
            height: 120px; overflow-y: auto; margin-bottom: 25px;
            color: #94a3b8; -webkit-overflow-scrolling: touch;
        }
        .notice-box b { color: #ef4444; }

        input { 
            width: 100%; padding: 15px; background: #000; border: 2px solid #fff; 
            color: #fff; font-family: 'DotGothic16'; text-align: center; 
            margin-bottom: 20px; box-sizing: border-box; font-size: 1rem;
            outline: none; border-radius: 0; appearance: none;
        }
        input:focus { border-color: #60a5fa; }

        .btn-start { 
            display: block; width: 100%; padding: 15px; background: transparent; 
            border: 2px solid #fff; color: #fff; cursor: pointer; 
            font-weight: bold; font-family: 'DotGothic16'; font-size: 1rem;
            transition: 0.2s;
        }
        .btn-start:active { background: #fff; color: #000; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>GAME START</h1>

        <div class="notice-box">
            【冒険者へ】<br>
            ・登録名は「名前_⭕️⭕️総区」と記入ください。<br>
            ・途中から始める場合は、必ず同じ名前でログインしてね。<br>
            ・この冒険では<b>正解した問題</b>がMyボサツンの経験値となります。<br>
            ・重複正解は経験値にはならず、<b>あなたの教学力のみ</b>が上がります。<br>
            ・進化をすると、<b>回答時間</b>が伸び、<b>命の数</b>が増えるため、スコアを伸ばしやすくなります。<br>
            ・章別学習と復習問題でmyボサツンを育成し、バトルモードに挑戦してみてね。<br>
            ・バトルモードを使わず、勉強のみの利用も大丈夫です。<br>
            ・記述問題は完答です。ごめんね。
        </div>

        <p style="font-size: 0.8rem; color: #60a5fa; margin-bottom: 10px;">勇者の名前を刻んでください</p>
        
        <form method="POST" id="login-form">
            <input type="text" name="user_name" placeholder="なまえを入力" required autofocus onfocus="triggerParentBGM()">
            <button type="button" class="btn-start" onclick="handleLogin()">▶ 冒険をはじめる</button>
        </form>
    </div>

    <script>
        // クリックSE（各ページで持つ）
        const seClick = new Audio('/static/sounds/click.mp3');
        seClick.load();

        /**
         * 親画面（layout.html）のBGM再生を開始させる
         */
        function triggerParentBGM() {
            if (window.parent && window.parent.changeBGM) {
                window.parent.changeBGM('menu');
            }
        }

        /**
         * ログインボタン処理
         */
        function handleLogin() {
            const form = document.getElementById('login-form');
            const input = form.querySelector('input[name="user_name"]');

            if (!input.value) {
                form.reportValidity();
                return;
            }

            // 親のBGMが鳴っていなければ改めて指示
            triggerParentBGM();

            // クリック音を再生
            seClick.pause();
            seClick.currentTime = 0;
            
            const playPromise = seClick.play();

            if (playPromise !== undefined) {
                playPromise.then(() => {
                    // 音を聞かせるために150ms待機
                    setTimeout(() => {
                        form.submit();
                    }, 150);
                }).catch(error => {
                    form.submit();
                });
            } else {
                setTimeout(() => {
                    form.submit();
                }, 150);
            }
        }

        // Enterキー対応
        document.getElementById('login-form').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleLogin();
            }
        });

        // ページ読み込み時、もし親がいればBGMをセット
        window.onload = triggerParentBGM;
        
        // 画面タッチでもBGMが反応するように予備策
        window.addEventListener('click', triggerParentBGM, { once: true });
        window.addEventListener('touchstart', triggerParentBGM, { once: true });
    </script>
</body>
</html>
