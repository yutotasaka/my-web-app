<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>クイズRPG道場</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe src="{{ target_url }}" id="game-frame"></iframe>

    <script>
        const bgms = {
            menu: new Audio('/static/sounds/bgm_menu.mp3'),
            battle: new Audio('/static/sounds/bgm_battle.mp3'),
            study: new Audio('/static/sounds/bgm_study.mp3')
        };

        Object.values(bgms).forEach(a => { 
            a.loop = true; 
            a.volume = 0.4; 
            a.preload = "auto";
        });

        let currentBgm = null;

        /**
         * 子画面（iframe）から呼ばれるBGM切り替え関数
         */
        function changeBGM(type) {
            console.log("BGM Request:", type);
            const nextBgm = bgms[type];
            if (!nextBgm || currentBgm === nextBgm) return;

            if (currentBgm) {
                currentBgm.pause();
                currentBgm.currentTime = 0;
            }

            currentBgm = nextBgm;

            // 遷移直後に自動再生を試みる
            currentBgm.play().catch(e => {
                console.log("スマホのロック解除待ち...");
            });
        }

        /**
         * スマホ対策の核心：画面を触った瞬間に「全音源」を一度だけアクティベートする
         */
        const unlockAllAudio = () => {
            console.log("User touched the screen. Unlocking all audio tracks.");
            
            // 現在の曲があればそれを再生
            if (currentBgm) {
                currentBgm.play().catch(e => {});
            }

            // 【重要】全ての曲を「無音で一瞬だけ再生→停止」させる。
            // これにより、以降の画面切り替え（自動遷移）でもロックがかからなくなります。
            Object.values(bgms).forEach(audio => {
                if (audio !== currentBgm) {
                    // 低い音量で一瞬再生して即座に一時停止
                    const originalVolume = audio.volume;
                    audio.volume = 0;
                    audio.play().then(() => {
                        audio.pause();
                        audio.volume = originalVolume;
                    }).catch(() => {});
                }
            });

            // 一度この「全解放」に成功すれば、この関数はもう不要
            window.removeEventListener('click', unlockAllAudio);
            window.removeEventListener('touchstart', unlockAllAudio);
        };

        // 画面のどこかを触った瞬間に全解放
        window.addEventListener('click', unlockAllAudio);
        window.addEventListener('touchstart', unlockAllAudio);
    </script>
</body>
</html>
