<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>RANKING</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DotGothic16', sans-serif; background: #000; color: #fff; padding: 20px; }
        .rank-card { max-width: 500px; margin: auto; border: 4px solid #fff; background: #111; padding: 30px; }
        .rank-item { 
            display: flex; justify-content: space-between; padding: 12px; 
            border-bottom: 1px dashed #444; font-size: 1.1rem;
        }
        .rank-1 { color: #f59e0b; font-weight: bold; }
        .back-btn { 
            display: block; margin-top: 30px; padding: 15px; border: 2px solid #fff; 
            color: #fff; text-decoration: none; text-align: center;
        }
        .back-btn:hover { background: #fff; color: #000; }
    </style>
</head>
<body>
    <div class="rank-card">
        <h1 style="text-align:center; color:#ef4444; text-shadow: 2px 2px #000;">🏆 最大撃破数ランキング</h1>
        <div style="margin-top:20px;">
            {% for name, data in ranking %}
            <div class="rank-item {{ 'rank-1' if loop.index == 1 }}">
                <span>{{ loop.index }}位. {{ name }}</span>
                <span>{{ data.max_battle_score }} 体撃破</span>
            </div>
            {% endfor %}
        </div>
        <a href="/" class="back-btn">◀ 道場へもどる</a>
    </div>
</body>
</html>
