<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RANKING - クイズRPG</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        /* 基本レイアウト */
        body { 
            font-family: 'DotGothic16', sans-serif; 
            background: #000; 
            color: #fff; 
            padding: 20px; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            box-sizing: border-box;
        }
        .rank-card { 
            width: 100%; 
            max-width: 500px; 
            border: 4px solid #fff; 
            outline: 4px solid #333; 
            outline-offset: -8px; 
            background: #111; 
            padding: 30px; 
            box-sizing: border-box;
        }
        h1 { 
            text-align: center; 
            color: #ef4444; 
            text-shadow: 2px 2px #444; 
            font-size: 1.4rem;
            margin-bottom: 25px;
        }

        /* ランキングリスト */
        .rank-list { margin-top: 20px; }
        .rank-item { 
            display: flex; 
            justify-content: space-between; 
            padding: 15px 10px; 
            border-bottom: 1px dashed #444; 
            font-size: 1.1rem;
            transition: 0.2s;
        }
        .rank-item:hover { background: rgba(255,255,255,0.05); }

        /* 特殊順位の色分け */
        .rank-1 { color: #f59e0b; font-weight: bold; font-size: 1.3rem; border-bottom: 2px solid #f59e0b; }
        .rank-2 { color: #cbd5e1; font-weight: bold; }
        .rank-3 { color: #b45309; font-weight: bold; }

        .score-val { color: #ef4444; }

        /* 戻るボタン */
        .back-btn { 
            display: block; 
            margin-top: 30px; 
            padding: 15px; 
            border: 2px solid #fff; 
            color: #fff; 
            text-decoration: none; 
            text-align: center; 
            font-weight: bold;
            transition: 0.2s;
            cursor: pointer;
            background: transparent;
        }
        .back-btn:active { background: #fff; color: #000; }
    </style>
</head>
<body>
    <div class="rank-card">
        <h1>🏆 最大撃破数ランキング</h1>
        
        <div class="rank-list">
            {% for name, data in ranking %}
            <div class="rank-item 
                {% if loop.index == 1 %}rank-1{% elif loop.index == 2 %}rank-2{% elif loop.index == 3 %}rank-3{% endif %}">
                <span>
                    {% if loop.index == 1 %}👑{% endif %}
                    {{ loop.index }}位. {{ name }}
                </span>
                <span><span class="score-val">{{ data.max_battle_score }}</span> 体撃破</span>
            </div>
            {% endfor %}
        </div>

        <a href="javascript:void(0)" class="back-btn" onclick="navBackWithSound('/')">◀ 道場へもどる</a>
    </div>

    <script>
        // クリック音源の準備
        const seClick = new Audio('/static/sounds/click.mp3');
        seClick.load();

        /**
         * 音を鳴らしてから画面遷移する
         * @param {string} url - 遷移先のパス
         */
        function navBackWithSound(url) {
            // 音声再生のリセット
            seClick.pause();
            seClick.currentTime = 0;

            const playPromise = seClick.play();

            if (playPromise !== undefined) {
                playPromise.then(() => {
                    // 音が聞こえ始めるまで0.15秒待機して遷移
                    setTimeout(() => {
                        window.location.href = url;
                    }, 700);
                }).catch(e => {
                    // 再生エラー（ブロック等）時は即座に遷移
                    console.log("Audio play blocked:", e);
                    window.location.href = url;
                });
            } else {
                // 古いブラウザ用
                setTimeout(() => {
                    window.location.href = url;
                }, 150);
            }
        }
    </script>
</body>
</html>
