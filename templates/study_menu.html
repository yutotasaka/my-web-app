<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>修行メニュー</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DotGothic16', sans-serif; background: #000; color: #fff; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; border: 4px solid #fff; background: #111; padding: 30px; }
        .grid { display: grid; gap: 15px; margin-top: 25px; }
        .btn-category { 
            display: block; padding: 15px; border: 2px solid #fff; color: #fff; 
            text-decoration: none; transition: 0.2s; text-align: left;
        }
        .btn-category:hover { background: #fff; color: #000; }
        .btn-category::before { content: "・"; margin-right: 10px; }
        .back-link { display: block; margin-top: 25px; color: #666; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color: #60a5fa; border-bottom: 2px solid #60a5fa; padding-bottom: 10px;">修行カテゴリ選択</h2>
        <div class="grid">
            {% for cat in categories %}
            <a href="/start/{{ cat }}" class="btn-category">{{ cat }}</a>
            {% endfor %}
        </div>
        <a href="/" class="back-link">◀ もどる</a>
    </div>
</body>
</html>
