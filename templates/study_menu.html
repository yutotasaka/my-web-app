<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修行メニュー - クイズRPG</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'DotGothic16', sans-serif; 
            background: #000; 
            color: #fff; 
            padding: 20px; 
            text-align: center; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            margin: 0;
            box-sizing: border-box;
        }
        .container { 
            width: 100%;
            max-width: 500px; 
            margin: auto; 
            border: 4px solid #fff; 
            outline: 4px solid #333;
            outline-offset: -8px;
            background: #111; 
            padding: 30px; 
            box-sizing: border-box;
        }
        .grid { display: grid; gap: 12px; margin-top: 25px; }
        
        .btn-category { 
            display: block; 
            padding: 18px; 
            border: 2px solid #fff; 
            color: #fff; 
            text-decoration: none; 
            transition: 0.2s; 
            text-align: left;
            font-size: 1.1rem;
            background: transparent;
            cursor: pointer;
        }
        .btn-category:active { background: #fff; color: #000; }
        .btn-category::before { content: "▶"; margin-right: 12px; color: #f59e0b; }
        
        .back-link { 
            display: inline-block; 
            margin-top: 30px; 
            color: #94a3b8; 
            text-decoration: none; 
            font-size: 0.9rem;
            padding: 10px;
        }
        .back-link:active { color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color: #60a5fa; border-bottom: 2px solid #60a5fa; padding-bottom: 10px; margin: 0;">修行カテゴリ選択</h2>
        
        <div class="grid">
            {% for cat in categories %}
            <a href="javascript:void(0)" class="btn-category" onclick="navWithSound('/start/{{ cat }}')">
                {{ cat }}
            </a>
            {% endfor %}
        </div>
        
        <a href="javascript:void(0)" class="back-link" onclick="navWithSound('/')">◀ もどる</a>
    </div>

    <script>
        // 音源の準備
        const seClick = new Audio('/static/sounds/click.mp3');
        seClick.load();

        /**
         * クリック音を鳴らしてから遷移する
         * @param {string} url - 遷移先
         */
        function navWithSound(url) {
            // 再生中の音をリセット
            seClick.pause();
            seClick.currentTime = 0;

            const playPromise = seClick.play();

            if (playPromise !== undefined) {
                playPromise.then(() => {
                    // 音が鳴り始めたら、150ms後に遷移
                    setTimeout(() => {
                        window.location.href = url;
                    }, 700);
                }).catch(e => {
                    // 音がブロックされた場合は即座に遷移
                    console.log("Audio play blocked:", e);
                    window.location.href = url;
                });
            } else {
                // 古いブラウザ用
                setTimeout(() => {
                    window.location.href = url;
                }, 700);
            }
        }

        // ページ読み込み時に音声をアクティブにするための処理
        window.addEventListener('touchstart', function() {
            seClick.load();
        }, {once: true});
    </script>
</body>
</html>
