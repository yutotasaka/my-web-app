<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>クイズRPG道場</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe src="{{ target_url }}" id="game-frame"></iframe>

    <script>
        const bgms = {
            menu: new Audio('/static/sounds/bgm_menu.mp3'),
            battle: new Audio('/static/sounds/bgm_battle.mp3'),
            study: new Audio('/static/sounds/bgm_study.mp3')
        };

        Object.values(bgms).forEach(a => { 
            a.loop = true; 
            a.volume = 0.4; 
            a.preload = "auto";
        });

        let currentBgm = null;
        let isUnlocked = false; // 全音源のロック解除状態を管理

        /**
         * 子画面（iframe）から呼ばれるBGM切り替え関数
         */
        function changeBGM(type) {
            console.log("BGM Request:", type);
            const nextBgm = bgms[type];
            if (!nextBgm || currentBgm === nextBgm) return;

            if (currentBgm) {
                currentBgm.pause();
                currentBgm.currentTime = 0;
            }

            currentBgm = nextBgm;

            // 解除済みなら即再生。未解除なら次のユーザー操作(SE等)を待つ。
            if (isUnlocked) {
                currentBgm.play().catch(e => console.log("Auto-play failed, waiting for touch"));
            }
        }

        /**
         * スマホ対策の核心：ユーザー操作時に全音源の「通行許可」をまとめて取得する
         * SE(click.mp3)が鳴るタイミングでこれが動けば、BGMのロックも一緒に外れます。
         */
        const unlockAllAudio = () => {
            // すでにcurrentBgmが決まっているなら、この操作で即再生させる
            if (currentBgm && currentBgm.paused) {
                currentBgm.play().catch(e => {});
            }

            if (isUnlocked) return;

            console.log("Unlocking all audio tracks via user gesture.");

            // 全てのBGMを「一瞬だけ無音で再生→即停止」してブラウザの許可を得る
            Object.values(bgms).forEach(audio => {
                const originalVolume = audio.volume;
                audio.volume = 0; // 混ざらないように無音にする
                
                const p = audio.play();
                if (p !== undefined) {
                    p.then(() => {
                        // 今流すべき曲以外は即座に停止してスタンバイ
                        if (audio !== currentBgm) {
                            audio.pause();
                            audio.currentTime = 0;
                        }
                        audio.volume = originalVolume; // 音量を戻す
                    }).catch(e => console.log("Unlock failed for a track:", e));
                }
            });

            isUnlocked = true;
            // 完全に解放されたら、親画面のリスナーは外してOK
            window.removeEventListener('click', unlockAllAudio);
            window.removeEventListener('touchstart', unlockAllAudio);
        };

        // click（指を離した時）と touchstart（触れた瞬間）の両方で実行
        window.addEventListener('click', unlockAllAudio);
        window.addEventListener('touchstart', unlockAllAudio);
    </script>
</body>
</html>
