<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>クイズRPG道場</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe src="{{ target_url }}" id="game-frame"></iframe>

    <script>
        // 1. 音源の準備
        const bgms = {
            menu: new Audio('/static/sounds/bgm_menu.mp3'),
            battle: new Audio('/static/sounds/bgm_battle.mp3'),
            study: new Audio('/static/sounds/bgm_study.mp3')
        };

        // 基本設定
        Object.values(bgms).forEach(a => { 
            a.loop = true; 
            a.volume = 0.4; 
            a.preload = "auto";
        });

        let currentBgm = null;

        /**
         * BGMを切り替える関数（子画面から呼ばれる）
         */
        function changeBGM(type) {
            console.log("BGM Request:", type);
            if (!bgms[type]) return;
            if (currentBgm === bgms[type]) return;

            if (currentBgm) currentBgm.pause();
            currentBgm = bgms[type];
            currentBgm.currentTime = 0;
            
            // 再生（ブラウザの制限があるため、ここでは失敗してもOK）
            currentBgm.play().catch(e => {
                console.log("Play blocked. Waiting for user interaction.");
            });
        }

        /**
         * スマホ・PC共通：画面を触った瞬間に「音を出せる状態」にする
         */
        const unlockAudio = () => {
            // 現在セットされているBGMがあれば再生
            if (currentBgm && currentBgm.paused) {
                currentBgm.play().catch(e => console.log(e));
            }
            
            // 一度触ればロックは解除されるので、このイベント自体を消す
            window.removeEventListener('click', unlockAudio);
            window.removeEventListener('touchstart', unlockAudio);
        };

        // 画面全体へのクリック・タップを監視
        window.addEventListener('click', unlockAudio);
        window.addEventListener('touchstart', unlockAudio);
    </script>
</body>
</html>
