<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>クイズRPG道場</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe src="{{ target_url }}" id="game-frame"></iframe>

    <script>
        // 1. 音源を定義
        const bgms = {
            menu: new Audio('/static/sounds/bgm_menu.mp3'),
            battle: new Audio('/static/sounds/bgm_battle.mp3'),
            study: new Audio('/static/sounds/bgm_study.mp3')
        };

        // 2. 初期設定（ループと音量）
        Object.values(bgms).forEach(a => { 
            a.loop = true; 
            a.volume = 0.4; 
        });

        let currentBgm = null;

        /**
         * 子画面（iframe）から呼ばれるBGM切り替え関数
         */
        function changeBGM(type) {
            console.log("BGM Request:", type);
            const nextBgm = bgms[type];
            if (!nextBgm || currentBgm === nextBgm) return;

            // 前の曲を停止
            if (currentBgm) {
                currentBgm.pause();
                currentBgm.currentTime = 0;
            }

            currentBgm = nextBgm;

            // PCならこの時点で鳴り始める。スマホなら後のクリック待ち。
            currentBgm.play().catch(e => {
                console.log("Waiting for user interaction to start BGM...");
            });
        }

        /**
         * スマホ・PC共通：ユーザーが画面を触った瞬間に「今流れるべき音」を鳴らす
         */
        const handleUserInteraction = () => {
            if (currentBgm && currentBgm.paused) {
                currentBgm.play().catch(e => console.log("Play failed:", e));
            }
            // 一度再生に成功すれば、以降はこのリスナーは不要
            // ただし、スマホで「曲が切り替わった時」に再度ブロックされるのを防ぐため、
            // removeEventListener はあえて行わない方が安定する場合があります。
        };

        // click（PC/スマホ）と touchstart（スマホ最速）の両方を登録
        window.addEventListener('click', handleUserInteraction);
        window.addEventListener('touchstart', handleUserInteraction);
    </script>
</body>
</html>
