<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>クイズRPG道場</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe src="{{ target_url }}" id="game-frame"></iframe>

    <script>
        const bgms = {
            menu: new Audio('/static/sounds/bgm_menu.mp3'),
            battle: new Audio('/static/sounds/bgm_battle.mp3'),
            study: new Audio('/static/sounds/bgm_study.mp3')
        };

        Object.values(bgms).forEach(a => { 
            a.loop = true; 
            a.volume = 0.4; 
            a.preload = "auto";
        });

        let currentBgm = null;
        let isActivated = false;

        function changeBGM(type) {
            if (!bgms[type] || currentBgm === bgms[type]) return;

            if (currentBgm) currentBgm.pause();
            currentBgm = bgms[type];
            
            // スマホ向け：一度でも画面を触っていれば即再生
            if (isActivated) {
                currentBgm.currentTime = 0;
                currentBgm.play().catch(e => console.log("Play delay:", e));
            }
        }

        /**
         * スマホの「反応の鈍さ」を解消する魔法の処理
         */
        const activateAllAudio = () => {
            if (isActivated) return;

            // 重要：全ての音源を「0.1秒だけ再生して止める」
            // これによりスマホのブラウザが「このサイトの音はいつでも出してOK」と学習します
            Object.values(bgms).forEach(a => {
                a.play().then(() => {
                    // 今流すべき曲以外は即止める
                    if (a !== currentBgm) {
                        a.pause();
                        a.currentTime = 0;
                    }
                }).catch(e => {});
            });

            isActivated = true;
            console.log("Audio fully activated for mobile");

            // 二度手間にならないようイベント削除
            window.removeEventListener('click', activateAllAudio);
            window.removeEventListener('touchstart', activateAllAudio);
        };

        // touchstart（指が触れた瞬間）に反応させるのがスマホでは最速
        window.addEventListener('click', activateAllAudio);
        window.addEventListener('touchstart', activateAllAudio);
    </script>
</body>
</html>
