<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>クイズRPG道場</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        /* ゲーム画面を表示する窓 */
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe src="{{ target_url }}" id="game-frame"></iframe>

    <script>
        // BGMの準備
        const bgms = {
            menu: new Audio('/static/sounds/bgm_menu.mp3'),
            battle: new Audio('/static/sounds/bgm_battle.mp3'),
            study: new Audio('/static/sounds/bgm_study.mp3')
        };

        // 基本設定
        Object.values(bgms).forEach(b => { 
            b.loop = true; 
            b.volume = 0.4;
            b.preload = "auto";
        });

        let currentBgm = null;
        let isAudioEnabled = false; // 音声が有効化されたかどうかのフラグ

        /**
         * BGMを切り替える関数（子画面から呼び出す）
         */
        function changeBGM(type) {
            const nextBgm = bgms[type];
            if (!nextBgm || currentBgm === nextBgm) return;

            // 今の曲を停止
            if (currentBgm) {
                currentBgm.pause();
            }
            
            currentBgm = nextBgm;
            currentBgm.currentTime = 0;

            // 有効化済みであれば再生、未完了ならフラグを待つ
            if (isAudioEnabled) {
                currentBgm.play().catch(e => console.log("BGM Play Error:", e));
            }
        }

        /**
         * スマホ・PC共通：最初の操作で全音声をアクティベートする
         */
        const activateAudio = () => {
            if (isAudioEnabled) return;

            // 全てのBGMを一度だけ「再生→即停止」してブラウザの制限を解除する
            // これにより、以降はJSからの play() が自由に行えるようになる
            Object.values(bgms).forEach(audio => {
                // 無音で一度再生を試みる
                const playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        audio.pause();
                        audio.currentTime = 0;
                    }).catch(e => {
                        console.log("Audio unlock failed for a track:", e);
                    });
                }
            });

            // 現在選択されているBGMがあれば再生を開始
            if (currentBgm) {
                currentBgm.play().catch(e => {});
            }

            isAudioEnabled = true;

            // イベントリスナーを解除してメモリを節約
            window.removeEventListener('click', activateAudio);
            window.removeEventListener('touchstart', activateAudio);
        };

        // 最初のクリックまたはタップで発火
        window.addEventListener('click', activateAudio);
        window.addEventListener('touchstart', activateAudio);
    </script>
</body>
</html>
