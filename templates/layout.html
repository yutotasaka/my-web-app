<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>クイズRPG道場</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe src="{{ target_url }}" id="game-frame"></iframe>

    <script>
        const bgms = {
            menu: new Audio('/static/sounds/bgm_menu.mp3'),
            battle: new Audio('/static/sounds/bgm_battle.mp3'),
            study: new Audio('/static/sounds/bgm_study.mp3')
        };

        Object.values(bgms).forEach(a => { 
            a.loop = true; 
            a.volume = 0.4; 
            // スマホ向けに事前に少し読み込ませる
            a.preload = "auto";
        });

        let currentBgm = null;

        /**
         * 子画面（iframe）から呼ばれるBGM切り替え関数
         */
        function changeBGM(type) {
            console.log("BGM Request:", type);
            const nextBgm = bgms[type];
            if (!nextBgm || currentBgm === nextBgm) return;

            // 前の曲を停止してリセット
            if (currentBgm) {
                currentBgm.pause();
                currentBgm.currentTime = 0;
            }

            currentBgm = nextBgm;

            // 再生を試みる（スマホではここで一度ブロックされることが多い）
            const playPromise = currentBgm.play();
            
            if (playPromise !== undefined) {
                playPromise.catch(e => {
                    console.log("BGM playback is waiting for user touch.");
                });
            }
        }

        /**
         * ユーザーが画面を触った瞬間に「今セットされている曲」を強制的に鳴らす
         */
        const handleUserInteraction = () => {
            if (currentBgm && currentBgm.paused) {
                // ユーザーが触ったこの瞬間に play() を呼ぶことでロックが解除される
                currentBgm.play().catch(e => console.log("Unlock failed:", e));
            }
        };

        // スマホでは touchstart が最も反応が良い
        window.addEventListener('click', handleUserInteraction);
        window.addEventListener('touchstart', handleUserInteraction);
    </script>
</body>
</html>
